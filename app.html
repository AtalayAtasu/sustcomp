/* ─── STEP 1 ─── */
function S1({st,set}){
  const tog=id=>set(s=>({...s,sth:s.sth.map(x=>x.id===id?{...x,on:!x.on}:x)}));
  const upd=(id,k,v)=>set(s=>({...s,sth:s.sth.map(x=>x.id===id?{...x,[k]:v}:x)}));

  const sysPrompt=`SCOPE GUARDRAIL: This tool is designed exclusively for challenges with a clear environmental, social, or governance (ESG) dimension — such as carbon emissions, resource depletion, biodiversity loss, supply chain ethics, community impact, circular economy, or ESG-driven regulation. If the challenge or question does not have a meaningful ESG dimension, do not engage with the substance. Politely but firmly explain that this tool is scoped to sustainability strategy, and ask the participant to reframe their challenge around its environmental, social, or governance impact before you proceed.

You are a sustainability strategy professor facilitating an executive education session on stakeholder analysis. Review the group's work with intellectual rigor. Challenge vague answers. Identify gaps. Reference real companies (Unilever, BASF, Ørsted, Nestlé, Volkswagen, Patagonia, Apple, etc.) relevant to their industry context. Respond with exactly 5 numbered points, each a specific fact-based challenge or observation. No preamble, no sign-off, no general statements. Start directly with point 1. Hard limit: 300 words.`;

  const buildPrompt=()=>{
    const actv=st.sth.filter(x=>x.on);
    const ctx=`\nMARKET CONTEXT: ${st.mktSeg||'not specified'} | Profit outlook: ${st.profitPressure||'not specified'} | Past sustainability successes: ${st.sustSuccess||'not specified'}`;
    if(!actv.length)return`The group is analyzing challenge: "${st.fish.name||'unspecified'}" in industry: "${st.grp.industry||'unspecified'}".\n${ctx}\n\nThey have not yet activated any stakeholder categories. Briefly explain why completing a thorough stakeholder analysis is critical and ask what stakeholders are most relevant to their industry and market context.`;
    const text=actv.map(x=>{const tp=STYPES.find(t=>t.id===x.id);return`\n${tp.label}:\n  Who: ${x.who||'not specified'}\n  Pressure: ${x.pressure||'not specified'}\n  Business impact: ${x.impact||'not specified'}\n  Opportunity: ${x.opp||'not specified'}`;}).join('');
    return`Group "${st.grp.name||'unnamed'}" from industry "${st.grp.industry||'unspecified'}" has analyzed stakeholders for their challenge: "${st.fish.name}".\n${ctx}\n\nTheir stakeholder analysis:${text}\n\nReview this analysis in light of their market context and profit outlook. Identify what they may have missed, challenge any vague or shallow answers, and reference 1–2 comparable industry cases. Point out if the inactive stakeholder categories are actually material given their specific market.`;
  };

  return<div>
    <div className="card">

      <div className="ey">Question 1</div>
      <h2 className="ctitle">Stakeholder Analysis</h2>
      <p className="csub">Identify which stakeholder categories are driving the sustainability pressure. <strong>Each active stakeholder will become a benefit line in your NPV+ waterfall in Q3</strong> — linking the strategic analysis directly to the financial case.</p>
      <div className="divl"/>
      {STYPES.map(tp=>{
        const d=st.sth.find(x=>x.id===tp.id);
        return<div key={tp.id} className="sc" style={d.on?{borderColor:tp.mid}:{}}>
          <div className="sc-hd" onClick={()=>tog(tp.id)}>
            <div className="sc-hl">
              <div className="sc-ic" style={{background:tp.light}}>{tp.icon}</div>
              <div><div className="sc-nm" style={{color:d.on?tp.mid:'#333'}}>{tp.label}</div><div className="sc-ds">{tp.desc}</div></div>
            </div>
            <button className="tgl" style={d.on?{background:tp.mid}:{}} onClick={e=>{e.stopPropagation();tog(tp.id);}}>
              <div className="tgl-k" style={d.on?{left:21}:{}}/>
            </button>
          </div>
          {d.on&&<div className="sc-body">
            <div className="divl" style={{marginTop:0,marginBottom:'1.1rem'}}/>
            <div className="fld"><label>Who specifically?</label><textarea value={d.who} onChange={e=>upd(tp.id,'who',e.target.value)} placeholder="Name the specific actors within this category driving the pressure…" style={{minHeight:68}}/></div>
            <div className="fld"><label>Specific pressure</label><textarea value={d.pressure} onChange={e=>upd(tp.id,'pressure',e.target.value)} placeholder="The precise mechanism: regulation name, customer requirement, market signal…" style={{minHeight:68}}/></div>
            <div className="fld"><label>Impact on your business</label><textarea value={d.impact} onChange={e=>upd(tp.id,'impact',e.target.value)} placeholder="How does this affect costs, revenues, operations, access to capital or reputation?" style={{minHeight:68}}/></div>
            <div className="fld" style={{marginBottom:0}}><label>Where is the opportunity?</label><textarea value={d.opp} onChange={e=>upd(tp.id,'opp',e.target.value)} placeholder="What opportunity does acting on this disruption create? Why would it give you a competitive edge?" style={{minHeight:68}}/></div>
          </div>}
        </div>;
      })}
      <p style={{fontSize:'0.77rem',color:'#999',marginTop:'0.5rem'}}>Activate at least one stakeholder category. Each active category appears as a value line in Q3.</p>
    </div>
    <AIChat stageLabel="Stakeholder Analysis" systemPrompt={sysPrompt} buildPrompt={buildPrompt} onUpdate={m=>set(s=>({...s,chats:{...s.chats,q1:m}}))} initialMsgs={st.chats?.q1} regenUsed={!!st.chatRegenUsed?.q1} onRegenUsed={()=>set(s=>({...s,chatRegenUsed:{...(s.chatRegenUsed||{}),q1:true}}))}/>
  </div>;
}

/* ─── STEP 2 ─── */
function S2({st,set}){
  const upd=(k,v)=>set(s=>({...s,[k]:v}));
  const updSub=(field,k,v)=>set(s=>({...s,[field]:{...s[field],[k]:v}}));
  const toggleCombo=id=>set(s=>({...s,comboLevers:(s.comboLevers||[]).includes(id)?(s.comboLevers||[]).filter(x=>x!==id):[...(s.comboLevers||[]),id]}));

  const COMBO_CHIPS=[
    {id:'cost',  label:'Cost Reduction',     color:'#B45309'},
    {id:'wtp',   label:'WTP Creation',        color:'#2D6A4F'},
    {id:'mktEx', label:'New Customer Group',  color:'#1565C0'},
    {id:'mktNew',label:'New Market',          color:'#6B21A8'},
  ];

  const sysPrompt=`SCOPE GUARDRAIL: This tool is designed exclusively for challenges with a clear environmental, social, or governance (ESG) dimension — such as carbon emissions, resource depletion, biodiversity loss, supply chain ethics, community impact, circular economy, or ESG-driven regulation. If the challenge or question does not have a meaningful ESG dimension, do not engage with the substance. Politely but firmly explain that this tool is scoped to sustainability strategy, and ask the participant to reframe their challenge around its environmental, social, or governance impact before you proceed.

You are a sustainability strategy professor reviewing strategic lever choices. Challenge vague lever selections. Test whether the opportunity is sufficiently specific and whether competitive advantages are realistic. Ask about competitive dynamics and second-order effects. Reference real strategic pivots by companies (e.g. Ørsted from oil to wind, Unilever's Sustainable Living brands, Interface's Mission Zero, Patagonia's repair model). Respond with exactly 5 numbered points, each a specific fact-based challenge or observation. No preamble, no sign-off, no general statements. Start directly with point 1. Hard limit: 300 words.`;

  const buildPrompt=()=>{
    const linfo=LEVERS.find(l=>l.id===st.lever);
    let detail='';
    if(st.lever==='cost')detail=`Immediacy of cost reduction: ${st.costData?.i||'not specified'}\nCompetitive advantages & gaps: ${st.costData?.ii||'not specified'}`;
    else if(st.lever==='wtp')detail=`Target segment & WTP rationale: ${st.wtpData?.i||'not specified'}\nCompetitive advantages & gaps: ${st.wtpData?.ii||'not specified'}`;
    else if(st.lever==='mktEx')detail=`Why new customers would be convinced: ${st.mktExData?.i||'not specified'}\nCompetitive advantages & gaps: ${st.mktExData?.ii||'not specified'}`;
    else if(st.lever==='mktNew')detail=`Unmet need & value creation: ${st.mktNewData?.i||'not specified'}\nCompetitive advantages & gaps: ${st.mktNewData?.ii||'not specified'}`;
    else if(st.lever==='combo'){
      const parts=[];
      if((st.comboLevers||[]).includes('cost'))parts.push(`Cost — immediacy: "${st.costData?.i||'—'}" | adv/gaps: "${st.costData?.ii||'—'}"`);
      if((st.comboLevers||[]).includes('wtp'))parts.push(`WTP — segment: "${st.wtpData?.i||'—'}" | adv/gaps: "${st.wtpData?.ii||'—'}"`);
      if((st.comboLevers||[]).includes('mktEx'))parts.push(`New Customers: "${st.mktExData?.i||'—'}" | adv/gaps: "${st.mktExData?.ii||'—'}"`);
      if((st.comboLevers||[]).includes('mktNew'))parts.push(`New Market: "${st.mktNewData?.i||'—'}" | adv/gaps: "${st.mktNewData?.ii||'—'}"`);
      detail=`Levers combined: ${(st.comboLevers||[]).join(', ')||'none selected'}\n${parts.join('\n')}\nAdditional wins & investments: ${st.comboAdditional||'not specified'}`;
    }
    return`Group "${st.grp.name||'unnamed'}" (${st.grp.industry||'industry unspecified'}) is addressing challenge: "${st.fish.name}".

MARKET CONTEXT: ${st.mktSeg||'not specified'} | Profit outlook: ${st.profitPressure||'not specified'} | Past sustainability successes: ${st.sustSuccess||'not specified'}

Opportunity description: ${st.oppDesc||'not specified'}

Strategic lever selected: ${linfo?.label||'none selected'}
${detail}

Challenge their lever choice in light of the market and profit context above. Is this the right lever given the profit environment? Is the opportunity specific enough? Are their claimed competitive advantages realistic? Draw on the industry track record of sustainability initiatives they described. Reference 1 comparable company case.`;
  };

  const fs={minHeight:76};
  const subSection=(color,title,fields)=>(
    <div style={{border:`1px solid ${color}22`,borderLeft:`4px solid ${color}`,borderRadius:'var(--r)',padding:'1.25rem 1.5rem',marginBottom:'0.875rem'}}>
      <div style={{fontSize:'0.7rem',fontWeight:700,color,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'0.875rem'}}>{title}</div>
      {fields.map(([lbl,val,setter,ph],i)=>(
        <div className="fld" key={i} style={i===fields.length-1?{marginBottom:0}:{}}>
          <label>{lbl}</label>
          <textarea value={val} onChange={e=>setter(e.target.value)} placeholder={ph} style={fs}/>
        </div>
      ))}
    </div>
  );

  return<div>
    <div className="card">
      <div className="ey">Question 2</div>
      <h2 className="ctitle">Strategic Lever</h2>
      <p className="csub">Identify the primary lever that turns your sustainability challenge into a business opportunity, then develop it with concrete sub-questions.</p>
      <div className="divl"/>
      <div className="fld">
        <label>1 · Describe the sustainability business opportunity you want to develop</label>
        <textarea value={st.oppDesc||''} onChange={e=>upd('oppDesc',e.target.value)} placeholder="What is the specific opportunity? What makes it viable now? How does it connect to your sustainability challenge?" style={{minHeight:96}}/>
      </div>
      <div className="divl"/>
      <div className="fld" style={{marginBottom:0}}>
        <label>2 · Select the primary lever that best captures the opportunity</label>
        <div className="lg" style={{gridTemplateColumns:'1fr 1fr',marginTop:'0.5rem'}}>
          {LEVERS.map(l=>(
            <div key={l.id} className={`lc ${st.lever===l.id?'sel':''}`} onClick={()=>upd('lever',l.id)} style={l.id==='combo'?{gridColumn:'1/-1'}:{}}>
              <span className="lt" style={{background:l.bg,color:l.tc}}>{l.tag}</span>
              <div className="ltt">{l.label}</div>
              <div className="ld">{l.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>

    {st.lever==='cost'&&<div className="card">
      <div className="ey">2a · Cost Reduction</div>
      <h2 className="ctitle" style={{fontSize:'1.3rem'}}>Cost reduction — deep dive</h2>
      <div className="divl"/>
      <div className="fld">
        <label>2a.i — Will the cost reduction actions immediately lead to lower operating costs, or is there a prior capital investment needed, or both?</label>
        <textarea value={st.costData?.i||''} onChange={e=>updSub('costData','i',e.target.value)} placeholder="Which cost lines will fall, over what timeframe, and what must happen first? How immediate is the saving?" style={fs}/>
      </div>
      <div className="fld" style={{marginBottom:0}}>
        <label>2a.ii — What competitive advantages do you have to make this opportunity a reality? What competences are missing?</label>
        <textarea value={st.costData?.ii||''} onChange={e=>updSub('costData','ii',e.target.value)} placeholder="Strengths that give you an edge (operations, supplier relationships, scale…). Gaps you need to close (technology, talent, partnerships…)" style={fs}/>
      </div>
    </div>}

    {st.lever==='wtp'&&<div className="card">
      <div className="ey">2b · WTP Creation</div>
      <h2 className="ctitle" style={{fontSize:'1.3rem'}}>Willingness-to-pay — deep dive</h2>
      <div className="divl"/>
      <div className="fld">
        <label>2b.i — What market segment are you targeting and why would the target customer be willing to pay more?</label>
        <textarea value={st.wtpData?.i||''} onChange={e=>updSub('wtpData','i',e.target.value)} placeholder="Customer profile, what sustainability attribute justifies a premium, estimated premium size, evidence of willingness to pay…" style={fs}/>
      </div>
      <div className="fld" style={{marginBottom:0}}>
        <label>2b.ii — What competitive advantages do you have to make this opportunity a reality? What competences are missing?</label>
        <textarea value={st.wtpData?.ii||''} onChange={e=>updSub('wtpData','ii',e.target.value)} placeholder="Strengths (brand, certification, supply chain traceability…). Gaps (credibility, measurement, marketing capabilities…)" style={fs}/>
      </div>
    </div>}

    {st.lever==='mktEx'&&<div className="card">
      <div className="ey">2c.i · Market Creation — New Customers</div>
      <h2 className="ctitle" style={{fontSize:'1.3rem'}}>New customer group — deep dive</h2>
      <div className="divl"/>
      <div className="fld">
        <label>2c.i.1 — Why would these customers now be convinced by your offer — lower price, new value, or both?</label>
        <textarea value={st.mktExData?.i||''} onChange={e=>updSub('mktExData','i',e.target.value)} placeholder="Who are they? What barrier previously excluded them? What does your sustainable offering change — price, accessibility, or value proposition?" style={fs}/>
      </div>
      <div className="fld" style={{marginBottom:0}}>
        <label>2c.i.2 — What competitive advantages do you have to make this opportunity a reality? What competences are missing?</label>
        <textarea value={st.mktExData?.ii||''} onChange={e=>updSub('mktExData','ii',e.target.value)} placeholder="Strengths enabling reach to new customers. Gaps in distribution, product fit, or go-to-market capability…" style={fs}/>
      </div>
    </div>}

    {st.lever==='mktNew'&&<div className="card">
      <div className="ey">2c.ii · Market Creation — New Market</div>
      <h2 className="ctitle" style={{fontSize:'1.3rem'}}>New market — deep dive</h2>
      <div className="divl"/>
      <div className="fld">
        <label>2c.ii.1 — What is the unmet need, for whom, and how will your offer create value for customers?</label>
        <textarea value={st.mktNewData?.i||''} onChange={e=>updSub('mktNewData','i',e.target.value)} placeholder="Define the latent need. Who is the customer that hasn't been served? What triggers them to buy? What value are you creating?" style={fs}/>
      </div>
      <div className="fld" style={{marginBottom:0}}>
        <label>2c.ii.2 — What competitive advantages do you have to make this opportunity a reality? What competences are missing?</label>
        <textarea value={st.mktNewData?.ii||''} onChange={e=>updSub('mktNewData','ii',e.target.value)} placeholder="What makes you the right company to create this market? What capabilities or partnerships are needed?" style={fs}/>
      </div>
    </div>}

    {st.lever==='combo'&&<div className="card">
      <div className="ey">2d · Combination</div>
      <h2 className="ctitle" style={{fontSize:'1.3rem'}}>Combination — deep dive</h2>
      <p className="csub">Select the levers you are combining and answer the sub-questions for each.</p>
      <div className="divl"/>
      <div style={{display:'flex',flexWrap:'wrap',gap:'0.5rem',marginBottom:'1.5rem'}}>
        {COMBO_CHIPS.map(c=>{
          const sel=(st.comboLevers||[]).includes(c.id);
          return<button key={c.id} onClick={()=>toggleCombo(c.id)} style={{padding:'0.38rem 1rem',borderRadius:20,border:`2px solid ${sel?c.color:'var(--border-m)'}`,background:sel?c.color+'18':'white',color:sel?c.color:'#555',fontSize:'0.82rem',fontWeight:sel?600:400,cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s'}}>{c.label}</button>;
        })}
      </div>

      {(st.comboLevers||[]).includes('cost')&&subSection('#B45309','Cost Reduction',[
        ['2a.i — Immediacy of cost reduction',st.costData?.i||'',v=>updSub('costData','i',v),'Immediate savings or capital investment needed first?'],
        ['2a.ii — Competitive advantages & gaps',st.costData?.ii||'',v=>updSub('costData','ii',v),'Strengths and capability gaps…'],
      ])}
      {(st.comboLevers||[]).includes('wtp')&&subSection('#2D6A4F','WTP Creation',[
        ['2b.i — Target segment & WTP rationale',st.wtpData?.i||'',v=>updSub('wtpData','i',v),'Who pays more and why?'],
        ['2b.ii — Competitive advantages & gaps',st.wtpData?.ii||'',v=>updSub('wtpData','ii',v),'Strengths and capability gaps…'],
      ])}
      {(st.comboLevers||[]).includes('mktEx')&&subSection('#1565C0','New Customer Group',[
        ['2c.i.1 — Why new customers would be convinced',st.mktExData?.i||'',v=>updSub('mktExData','i',v),'Lower price, new value, or both?'],
        ['2c.i.2 — Competitive advantages & gaps',st.mktExData?.ii||'',v=>updSub('mktExData','ii',v),'Strengths and capability gaps…'],
      ])}
      {(st.comboLevers||[]).includes('mktNew')&&subSection('#6B21A8','New Market',[
        ['2c.ii.1 — Unmet need & value creation',st.mktNewData?.i||'',v=>updSub('mktNewData','i',v),'What unmet need, for whom, what value?'],
        ['2c.ii.2 — Competitive advantages & gaps',st.mktNewData?.ii||'',v=>updSub('mktNewData','ii',v),'Strengths and capability gaps…'],
      ])}

      <div className="fld" style={{marginBottom:0,marginTop:(st.comboLevers||[]).length>0?'0.25rem':0}}>
        <label>2d.i — Describe any additional wins as well as actions and investments needed to achieve the combined results</label>
        <textarea value={st.comboAdditional||''} onChange={e=>upd('comboAdditional',e.target.value)} placeholder="How do the combined levers reinforce each other? What synergies emerge from the combination? What specific investments or actions are required?" style={{minHeight:96}}/>
      </div>
    </div>}

    <AIChat stageLabel="Strategic Lever" systemPrompt={sysPrompt} buildPrompt={buildPrompt} onUpdate={m=>set(s=>({...s,chats:{...s.chats,q2:m}}))} initialMsgs={st.chats?.q2} regenUsed={!!st.chatRegenUsed?.q2} onRegenUsed={()=>set(s=>({...s,chatRegenUsed:{...(s.chatRegenUsed||{}),q2:true}}))}/>
  </div>;
}

/* ─── STEP 3 ─── */
function S3({st,set}){
  const upd=(k,v)=>set(s=>({...s,[k]:v}));
  const usth=(id,k,v)=>set(s=>({...s,sth:s.sth.map(x=>x.id===id?{...x,[k]:v}:x)}));
  const [vh,setVh]=useState(5);
  const actv=st.sth.filter(x=>x.on);
  const cur=st.curr;
  const afV=af(st.rate,vh);
  const capN=parseFloat(st.capex)||0;
  const totalAnn=actv.reduce((a,x)=>a+(parseFloat(x.annual)||0),0);
  const npv5=-capN+actv.reduce((a,x)=>a+(parseFloat(x.annual)||0)*af(st.rate,5),0);
  const npv10=-capN+actv.reduce((a,x)=>a+(parseFloat(x.annual)||0)*af(st.rate,10),0);

  const sysPrompt=`SCOPE GUARDRAIL: This tool is designed exclusively for challenges with a clear environmental, social, or governance (ESG) dimension — such as carbon emissions, resource depletion, biodiversity loss, supply chain ethics, community impact, circular economy, or ESG-driven regulation. If the challenge or question does not have a meaningful ESG dimension, do not engage with the substance. Politely but firmly explain that this tool is scoped to sustainability strategy, and ask the participant to reframe their challenge around its environmental, social, or governance impact before you proceed.

You are a sustainability strategy professor and former investment banker reviewing a group's NPV+ financial model. Challenge assumptions aggressively but constructively. Ask: What is driving that number? What would a skeptical CFO push back on? What is the single biggest assumption risk? Reference a comparable deal or investment case (e.g. Ørsted wind, Plastic Energy, Interface recycled carpets, Renault EV). Respond with exactly 5 numbered points, each a specific fact-based challenge or observation. No preamble, no sign-off, no general statements. Start directly with point 1. Hard limit: 300 words.`;

  const buildPrompt=()=>{
    const lines=actv.map(x=>{const tp=STYPES.find(t=>t.id===x.id);return`${tp.label} — ${x.blabel||x.opp?.slice(0,40)||'benefit'}: ${fmt(parseFloat(x.annual)||0,cur)}/year`;}).join('\n');
    return`Group "${st.grp.name||'unnamed'}" (${st.grp.industry||'unspecified'}) NPV+ model for "${st.fish.name}":

MARKET CONTEXT: ${st.mktSeg||'not specified'} | Profit outlook: ${st.profitPressure||'not specified'} | Past sustainability successes: ${st.sustSuccess||'not specified'}

CAPEX: ${capN>0?fmt(-capN,cur):'None'}
Discount rate (WACC): ${st.rate}%

Benefit lines:
${lines||'None entered'}

NPV+ at 5 years: ${fmt(npv5,cur)}
NPV+ at 10 years: ${fmt(npv10,cur)}
CFO Pitch narrative: ${st.pitch||'not provided'}

Challenge this financial model with the market context in mind. Are the benefit assumptions realistic given their profit environment and industry track record? What is the single most important question a CFO would ask? What are they missing? Reference a comparable case from their or an adjacent industry.`;
  };

  return<div>
    <div className="card">

      <div className="ey">Question 3</div>
      <h2 className="ctitle">NPV+ Valuation</h2>
      <p className="csub">Quantify the value of each stakeholder-driven opportunity. The NPV+ framework builds a cumulative waterfall — starting from CAPEX, then adding the present value of each benefit stream — showing exactly which stakeholders tip the project positive, and when.</p>
      <div className="divl"/>
      <div className="g2">
        <div className="fld"><label>Currency</label><select value={cur} onChange={e=>upd('curr',e.target.value)}>{CURR.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="fld"><label>CAPEX / upfront investment ({cur})</label><input type="number" value={st.capex} onChange={e=>upd('capex',e.target.value)} placeholder="0 if none" min="0"/><div className="fld-hint">Leave blank if no upfront investment required</div></div>
      </div>
      <div className="fld" style={{marginBottom:0}}>
        <label>Discount rate (WACC) — {st.rate}%</label>
        <div style={{display:'flex',alignItems:'center',gap:12,marginTop:'0.35rem'}}>
          <input type="range" min="2" max="20" step="1" value={st.rate} onChange={e=>upd('rate',+e.target.value)} style={{flex:1}}/>
          <span style={{fontSize:'0.82rem',fontWeight:500,color:'var(--blue)',minWidth:35}}>{st.rate}%</span>
        </div>
      </div>
    </div>

    <div className="card">

      <div className="ey">Stakeholder benefit lines</div>
      <h2 className="ctitle" style={{fontSize:'1.3rem'}}>Quantify each opportunity</h2>
      <p className="csub">For each active stakeholder from Q1, enter the estimated annual financial value. These become the NPV+ waterfall lines.</p>
      <div className="divl"/>
      {actv.length===0&&<div style={{textAlign:'center',padding:'2rem',color:'#aaa',fontSize:'0.85rem'}}>No stakeholders activated in Q1. Go back and activate at least one.</div>}
      {actv.map(s=>{
        const tp=STYPES.find(t=>t.id===s.id),ann=parseFloat(s.annual)||0,contrib=ann*afV;
        return<div key={s.id} className="nl">
          <div className="nl-hd">
            <div className="nl-left">
              <div className="nl-badge" style={{background:tp.light}}>{tp.icon}</div>
              <div><div className="nl-nm" style={{color:tp.mid}}>{tp.label}</div><div className="nl-sub">{ann>0?`${fmt(ann,cur)}/year`:'Enter annual benefit below'}</div></div>
            </div>
            {ann>0&&<div className="nl-val" style={{color:tp.mid}}>{fmt(contrib,cur)}<span style={{fontSize:'0.7rem',fontWeight:400,color:'#999',marginLeft:4}}>NPV @ {vh}yr</span></div>}
          </div>
          <div className="nl-body">
            <div className="fld" style={{marginTop:'0.75rem'}}><label>Benefit description</label><input type="text" value={s.blabel} onChange={e=>usth(s.id,'blabel',e.target.value)} placeholder={s.opp?s.opp.slice(0,70):'Short label — e.g. EU Carbon tax savings, Recycling margin…'}/></div>
            <div className="g2">
              <div className="fld" style={{marginBottom:0}}>
                <label>Annual benefit ({cur})</label>
                <input type="number" value={s.annual} onChange={e=>usth(s.id,'annual',e.target.value)} placeholder="e.g. 500000" min="0"/>
                <div className="fld-hint">Steady-state annual value once implemented</div>
              </div>
              <div className="fld" style={{marginBottom:0}}>
                <label>NPV contribution @ {vh}yr</label>
                <div style={{padding:'0.56rem 0.8rem',background:'var(--cream-d)',borderRadius:'var(--r)',fontSize:'0.875rem',fontWeight:500,color:ann>0?tp.mid:'#ccc',border:'1px solid var(--border)'}}>{ann>0?`${fmt(contrib,cur)}`:'—'}</div>
                <div className="fld-hint">WACC {st.rate}% · {vh}-year horizon</div>
              </div>
            </div>
          </div>
        </div>;
      })}
    </div>

    <div className="wf">
      <div className="wf-hd">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div className="wf-ttl">NPV+ Waterfall</div>
        </div>
        <div className="htabs">{[5,10].map(h=><button key={h} className={`htab ${vh===h?'on':''}`} onClick={()=>setVh(h)}>{h}-year</button>)}</div>
      </div>
      <Waterfall sth={actv} capex={st.capex} rate={st.rate} horizon={vh} curr={cur}/>
      <div className="npv3">
        <div className="npv3b"><div className="npv3l">Annual net benefit</div><div className={`npv3v ${totalAnn>0?'pos':''}`}>{fmt(totalAnn,cur)}</div></div>
        <div className="npv3b"><div className="npv3l">NPV+ at 5 years</div><div className={`npv3v ${npv5>0?'pos':'neg'}`}>{fmt(npv5,cur)}</div></div>
        <div className="npv3b"><div className="npv3l">NPV+ at 10 years</div><div className="npv3v gld">{fmt(npv10,cur)}</div></div>
      </div>
      <div style={{marginTop:'0.875rem',fontSize:'0.7rem',color:'rgba(255,255,255,0.22)',textAlign:'center'}}>NPV+ = −CAPEX + Σ (annual benefit × annuity factor) · WACC {st.rate}% · steady-state from year 1</div>
    </div>

    <div className="card">

      <div className="ey">The pitch</div>
      <h2 className="ctitle" style={{fontSize:'1.3rem'}}>Present to your CFO or investor</h2>
      <p className="csub">Walk through the waterfall. Justify each benefit line. Is this a 5-year or 10-year story? What are the key risks?</p>
      <div className="divl"/>
      <div className="fld" style={{marginBottom:0}}><textarea value={st.pitch} onChange={e=>upd('pitch',e.target.value)} placeholder="Explain the assumptions. For each stakeholder benefit: what drives it, how confident are you, what market share or regulation assumption underpins it? What must happen for the project to reach positive NPV?" style={{minHeight:130}}/></div>
    </div>

    <AIChat stageLabel="NPV+ Valuation" systemPrompt={sysPrompt} buildPrompt={buildPrompt} onUpdate={m=>set(s=>({...s,chats:{...s.chats,q3:m}}))} initialMsgs={st.chats?.q3} regenUsed={!!st.chatRegenUsed?.q3} onRegenUsed={()=>set(s=>({...s,chatRegenUsed:{...(s.chatRegenUsed||{}),q3:true}}))}/>
  </div>;
}

/* ─── STEP 4: SUMMARY ─── */
function S4({st,set}){
  const [submitted,setSubmitted]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const [submitErr,setSubmitErr]=useState('');
  const {grp,fish,sth,lever,ldetail,mseg,curr,capex,rate,pitch}=st;
  const actv=sth.filter(x=>x.on);
  const cap=parseFloat(capex)||0;
  const lines=actv.map(s=>({...s,ann:parseFloat(s.annual)||0}));
  const npv5=-cap+lines.reduce((a,x)=>a+x.ann*af(rate,5),0);
  const npv10=-cap+lines.reduce((a,x)=>a+x.ann*af(rate,10),0);
  const totAnn=lines.reduce((a,x)=>a+x.ann,0);
  const linfo=LEVERS.find(l=>l.id===lever);

  const submitToInstructor=async()=>{
    setSubmitting(true);setSubmitErr('');
    try{
      const resp=await fetch('/api/submit',{
        method:'POST',
        headers:{'content-type':'application/json'},
        body:JSON.stringify({
          groupName:grp.name||'',
          members:st.grp.members||'',
          industry:grp.industry||'',
          challengeName:fish.name||'',
          challengeDesc:fish.desc||'',
          mktSeg:st.mktSeg||'',
          profitPressure:st.profitPressure||'',
          sustSuccess:st.sustSuccess||'',
          lever,
          oppDesc:st.oppDesc||'',
          costData:st.costData||{},
          wtpData:st.wtpData||{},
          mktExData:st.mktExData||{},
          mktNewData:st.mktNewData||{},
          comboLevers:st.comboLevers||[],
          comboAdditional:st.comboAdditional||'',
          stakeholders:actv,
          benefitLines:lines,
          npv5,npv10,
          capex:parseFloat(st.capex)||0,
          rate:parseFloat(rate)||0,
          currency:curr,
          pitch:st.pitch||'',
          consultantHtml:st.consultantReport||'',
          reportHtml:st.cfoHtml||''
        })
      });
      if(!resp.ok)throw new Error('Server error '+resp.status);
      setSubmitted(true);
    }catch(e){setSubmitErr(e.message);}
    setSubmitting(false);
  };

  return<div>
    <div className="card" style={{marginBottom:'1.5rem'}}>

      <div className="ey">Complete output</div>
      <h2 className="ctitle">Group Summary</h2>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'1rem',marginTop:'0.5rem'}}>
        <div>
          <div style={{fontSize:'1rem',fontWeight:500}}>{grp.name||'Unnamed group'}</div>
          {grp.industry&&<div style={{fontSize:'0.82rem',color:'#666'}}>{grp.industry}</div>}
          {grp.members&&<div style={{fontSize:'0.78rem',color:'#999',marginTop:3}}>{grp.members}</div>}
        </div>
        <div style={{display:'flex',gap:'0.75rem',flexWrap:'wrap'}}>
          <button className="btn btn-s no-print" onClick={()=>window.print()}>Print summary</button>
        </div>
      </div>
      {fish.name&&<div style={{marginTop:'1.25rem',background:'var(--blue-l)',borderRadius:'var(--r)',padding:'1rem 1.25rem',borderLeft:'4px solid var(--blue)'}}>
        <div style={{fontSize:'0.67rem',fontWeight:500,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--blue)',marginBottom:'0.3rem'}}>Challenge</div>
        <div style={{fontSize:'1.05rem',fontWeight:600,color:'var(--navy)',fontFamily:"'Playfair Display',serif"}}>{fish.name}</div>
        {fish.desc&&<div style={{fontSize:'0.83rem',color:'#555',marginTop:'0.3rem'}}>{fish.desc}</div>}
      </div>}
    </div>

    <div className="sum-sec">
      <div className="sum-sec-hd"><div><div className="sum-sec-ey">Question 1</div><h3>Stakeholder Analysis</h3></div></div>
      {actv.length===0&&<div className="sum-sec-body" style={{color:'#aaa',fontSize:'0.85rem'}}>Not completed.</div>}
      {actv.map((s,i)=>{
        const tp=STYPES.find(t=>t.id===s.id);
        return<div key={s.id} className="sum-sec-body" style={{borderBottom:i<actv.length-1?'1px solid var(--border)':0}}>
          <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'0.22rem 0.7rem',borderRadius:20,fontSize:'0.77rem',fontWeight:500,background:tp.light,color:tp.mid,marginBottom:'0.875rem'}}>{tp.icon} {tp.label}</span>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
            {[['Who',s.who],['Pressure',s.pressure],['Business impact',s.impact],['Opportunity',s.opp]].map(([l,v])=>(
              <div key={l} style={{display:'flex',flexDirection:'column',gap:'0.22rem'}}>
                <span style={{fontSize:'0.7rem',color:'#999'}}>{l}</span>
                <span style={{fontSize:'0.85rem',color:'#1A1A1A',lineHeight:1.55}}>{v||<em style={{color:'#ccc'}}>—</em>}</span>
              </div>
            ))}
          </div>
        </div>;
      })}
    </div>

    <div className="sum-sec">
      <div className="sum-sec-hd"><div><div className="sum-sec-ey">Question 2</div><h3>Strategic Lever</h3></div></div>
      <div className="sum-sec-body">
        {st.oppDesc&&<div style={{marginBottom:'1rem'}}><div style={{fontSize:'0.7rem',color:'#999',marginBottom:'0.22rem'}}>Opportunity</div><div style={{fontSize:'0.85rem',lineHeight:1.55}}>{st.oppDesc}</div></div>}
        {linfo&&<span style={{display:'inline-block',padding:'0.28rem 0.85rem',borderRadius:20,fontSize:'0.79rem',fontWeight:500,background:linfo.bg,color:linfo.tc,marginBottom:'0.875rem'}}>{linfo.label}</span>}
        {lever==='cost'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          {[['Immediacy',st.costData?.i],['Advantages & gaps',st.costData?.ii]].map(([l,v])=>(<div key={l}><div style={{fontSize:'0.7rem',color:'#999',marginBottom:'0.22rem'}}>{l}</div><div style={{fontSize:'0.85rem',lineHeight:1.55}}>{v||<em style={{color:'#ccc'}}>—</em>}</div></div>))}
        </div>}
        {lever==='wtp'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          {[['Target segment & WTP',st.wtpData?.i],['Advantages & gaps',st.wtpData?.ii]].map(([l,v])=>(<div key={l}><div style={{fontSize:'0.7rem',color:'#999',marginBottom:'0.22rem'}}>{l}</div><div style={{fontSize:'0.85rem',lineHeight:1.55}}>{v||<em style={{color:'#ccc'}}>—</em>}</div></div>))}
        </div>}
        {lever==='mktEx'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          {[['Why new customers convinced',st.mktExData?.i],['Advantages & gaps',st.mktExData?.ii]].map(([l,v])=>(<div key={l}><div style={{fontSize:'0.7rem',color:'#999',marginBottom:'0.22rem'}}>{l}</div><div style={{fontSize:'0.85rem',lineHeight:1.55}}>{v||<em style={{color:'#ccc'}}>—</em>}</div></div>))}
        </div>}
        {lever==='mktNew'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
          {[['Unmet need & value',st.mktNewData?.i],['Advantages & gaps',st.mktNewData?.ii]].map(([l,v])=>(<div key={l}><div style={{fontSize:'0.7rem',color:'#999',marginBottom:'0.22rem'}}>{l}</div><div style={{fontSize:'0.85rem',lineHeight:1.55}}>{v||<em style={{color:'#ccc'}}>—</em>}</div></div>))}
        </div>}
        {lever==='combo'&&<div>
          <div style={{fontSize:'0.7rem',color:'#999',marginBottom:'0.4rem'}}>Levers combined</div>
          <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap',marginBottom:'0.875rem'}}>
            {(st.comboLevers||[]).map(id=>{const l=LEVERS.find(x=>x.id===id);return l?<span key={id} style={{padding:'0.2rem 0.7rem',borderRadius:20,fontSize:'0.76rem',fontWeight:500,background:l.bg,color:l.tc}}>{l.label}</span>:null;})}
          </div>
          {st.comboAdditional&&<div><div style={{fontSize:'0.7rem',color:'#999',marginBottom:'0.22rem'}}>Additional wins & investments</div><div style={{fontSize:'0.85rem',lineHeight:1.55}}>{st.comboAdditional}</div></div>}
        </div>}
      </div>
    </div>

    <div className="sum-sec">
      <div className="sum-sec-hd"><div><div className="sum-sec-ey">Question 3</div><h3>NPV+ Valuation</h3></div></div>
      <div className="sum-sec-body">
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.875rem',marginBottom:'1.5rem'}}>
          {[['Annual net benefit',totAnn,totAnn>0],['NPV+ at 5 years',npv5,npv5>0],['NPV+ at 10 years',npv10,npv10>0]].map(([l,v,pos])=>(
            <div key={l} style={{background:'var(--cream-d)',borderRadius:'var(--r)',padding:'0.875rem',textAlign:'center'}}>
              <div style={{fontSize:'0.62rem',color:'#999',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'0.3rem'}}>{l}</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:'1.1rem',fontWeight:600,color:pos?'var(--pos)':'var(--neg)'}}>{fmt(v,curr)}</div>
            </div>
          ))}
        </div>
        <table className="stbl">
          <thead><tr><th>Stakeholder</th><th>Benefit</th><th style={{textAlign:'right'}}>Annual</th><th style={{textAlign:'right'}}>NPV 5yr</th><th style={{textAlign:'right'}}>NPV 10yr</th></tr></thead>
          <tbody>
            {cap>0&&<tr><td style={{color:'var(--neg)'}}>CAPEX</td><td>—</td><td style={{textAlign:'right',color:'var(--neg)',fontWeight:500}}>{fmt(-cap,curr)}</td><td style={{textAlign:'right',color:'var(--neg)'}}>{fmt(-cap,curr)}</td><td style={{textAlign:'right',color:'var(--neg)'}}>{fmt(-cap,curr)}</td></tr>}
            {lines.map(l=>{const tp=STYPES.find(t=>t.id===l.id);return<tr key={l.id}><td><span style={{fontSize:'0.8rem',color:tp.mid,fontWeight:500}}>{tp.icon} {tp.label.split(' ')[0]}</span></td><td style={{color:'#555'}}>{l.blabel||l.opp?.slice(0,40)||'—'}</td><td style={{textAlign:'right',fontWeight:500}}>{fmt(l.ann,curr)}</td><td style={{textAlign:'right',color:'var(--pos)'}}>{fmt(l.ann*af(rate,5),curr)}</td><td style={{textAlign:'right',color:'var(--pos)'}}>{fmt(l.ann*af(rate,10),curr)}</td></tr>;})}
          </tbody>
        </table>
        {pitch&&<div style={{marginTop:'1.25rem'}}><div style={{fontSize:'0.68rem',fontWeight:500,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--gold-d)',marginBottom:'0.6rem'}}>CFO Pitch</div><div style={{fontSize:'0.86rem',lineHeight:1.65}}>{pitch}</div></div>}
      </div>
    </div>

    <div style={{background:'var(--blue-l)',border:'1px solid var(--border)',borderLeft:'4px solid var(--blue)',borderRadius:'var(--r)',padding:'0.75rem 1.1rem',marginBottom:'1.5rem',fontSize:'0.82rem',color:'#334',lineHeight:1.6}}>
      <strong>How these reports are generated:</strong> The AI Consultant and CFO Report below draw on everything you entered across all four stages — including any revisions you made after reading the AI feedback on each step. If you want to refine your inputs further, use the Back button, update your answers, then return here to generate fresh reports.
    </div>

    <AIConsultant st={st} initialReport={st.consultantReport||''} onReportChange={r=>set(s=>({...s,consultantReport:r}))} regenUsed={!!st.consultantRegenUsed} onRegenUsed={()=>set(s=>({...s,consultantRegenUsed:true}))}/>

    <CFOReport st={st} initialHtml={st.cfoHtml||''} onHtmlChange={h=>set(s=>({...s,cfoHtml:h}))} regenUsed={!!st.cfoRegenUsed} onRegenUsed={()=>set(s=>({...s,cfoRegenUsed:true}))}/>

    <div style={{background:'linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%)',borderRadius:'var(--r-lg)',padding:'2rem',textAlign:'center',border:'1px solid rgba(74,171,232,0.3)'}}>
      <h3 style={{color:'white',fontSize:'1.15rem'}}>Present to the CFO</h3>
      <p style={{color:'rgba(255,255,255,0.6)',fontSize:'0.85rem',margin:'0.5rem auto 1.5rem',maxWidth:'500px'}}>
        When you are happy with your analysis and AI-generated reports, submit your full presentation. Your instructor will receive the AI CFO Report and a complete record of your analysis.
        {!st.cfoHtml&&<span style={{display:'block',marginTop:'0.4rem',color:'rgba(252,157,157,0.8)',fontSize:'0.8rem'}}>⚠ Generate the AI CFO Report above before submitting for a complete presentation.</span>}
      </p>
      <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}>
        <button className="btn btn-p no-print" style={{fontSize:'0.9rem',padding:'0.75rem 2rem',opacity:submitted?0.6:1}} onClick={submitToInstructor} disabled={submitting||submitted}>
          {submitted?'✓ Presented to CFO':submitting?'Submitting…':'↑ Present to CFO'}
        </button>
      </div>
      {submitErr&&<p style={{color:'#FC9D9D',fontSize:'0.8rem',marginTop:'0.75rem'}}>{submitErr}</p>}
      {submitted&&<p style={{color:'rgba(255,255,255,0.5)',fontSize:'0.78rem',marginTop:'0.75rem'}}>Your CFO Report and complete analysis have been submitted. Good luck with your presentation!</p>}
    </div>
  </div>;
}

/* ─── APP ─── */
function App(){
  const DKEY=`sustcomp_${window.__USERNAME__||'guest'}`;

  // Load initial state from localStorage immediately (fast, no flash)
  const loadLocal=()=>{
    try{const s=localStorage.getItem(DKEY);return s?JSON.parse(s):null;}catch(e){return null;}
  };

  const local=loadLocal();
  const [step,setStep]=useState(local?.step||0);
  const [st,set]=useState(local?.st?{...init(),...local.st}:init());
  const [saved,setSaved]=useState(false);

  // Save to localStorage on every change
  useEffect(()=>{
    try{localStorage.setItem(DKEY,JSON.stringify({step,st}));}catch(e){}
  },[st,step]);

  // On mount: fetch server draft and restore (server is authoritative across devices)
  useEffect(()=>{
    fetch('/api/draft').then(r=>r.json()).then(data=>{
      if(data.state){
        set({...init(),...(data.state.st||{})});
        setStep(data.state.step||0);
      } else {
        // Server has no draft (new account, reset, or deleted) — clear stale localStorage
        set(init());setStep(0);
        try{localStorage.removeItem(DKEY);}catch(e){}
      }
    }).catch(()=>{});
  },[]);

  // Save to server immediately when step changes
  useEffect(()=>{
    setSaved(false);
    fetch('/api/draft',{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({step,st})})
      .then(()=>setSaved(true)).catch(()=>{});
  },[step]);

  // Save to server 2 seconds after user stops typing
  useEffect(()=>{
    const t=setTimeout(()=>{
      fetch('/api/draft',{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({step,st})})
        .then(()=>setSaved(true)).catch(()=>{});
    },2000);
    return()=>clearTimeout(t);
  },[st]);

  const LBLS=['Setup','Stakeholders','Strategy','NPV+','Summary'];
  const COMPS=[S0,S1,S2,S3,S4];
  const Comp=COMPS[step];
  return<div className="app">
    <header className="hdr">
      <div className="hdr-brand">
        <div><div className="hdr-title">Sustainability Strategy Compass</div></div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'1.25rem'}}>
        {(st.grp.name||st.fish.name)&&<div className="hdr-grp">{[st.grp.name,st.fish.name].filter(Boolean).join(' · ')}</div>}
        <a href="/logout" style={{fontSize:'0.75rem',color:'rgba(255,255,255,0.45)',textDecoration:'none',borderLeft:'1px solid rgba(255,255,255,0.15)',paddingLeft:'1.25rem'}} onMouseOver={e=>e.target.style.color='rgba(255,255,255,0.8)'} onMouseOut={e=>e.target.style.color='rgba(255,255,255,0.45)'}>Sign out</a>
      </div>
    </header>
    <div className="body">
      <Sidebar step={step} setStep={setStep}/>
      <main className="main"><Comp st={st} set={set}/></main>
    </div>
    <div className="nav no-print">
      <button className="btn btn-s" onClick={()=>setStep(s=>s-1)} disabled={step===0}>← Back</button>
      <div className="nav-info">Step {step+1} of 5 · {LBLS[step]}{saved&&<span style={{marginLeft:'0.5rem',fontSize:'0.65rem',opacity:0.45}}>✓ saved</span>}</div>
      {step<4?<button className="btn btn-p" onClick={()=>setStep(s=>s+1)}>Continue →</button>:<button className="btn btn-g" onClick={()=>window.print()}>Print summary</button>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
